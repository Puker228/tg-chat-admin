networks:
  billa_gorilla_network:
    driver: bridge

volumes:
  ollama:

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    networks:
      - billa_gorilla_network
    env_file:
      - .env
    environment:
      - AI_BASE_URL=http://ollama:11434
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.23.0
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - billa_gorilla_network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama-init:
    image: ollama/ollama:0.23.0
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "gemma3:270m"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - billa_gorilla_network
    restart: "no"
